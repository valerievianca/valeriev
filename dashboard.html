<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: black;
}

header {
    background:hsl(0, 90%, 20%);
    padding:15px 40px;
}
.logo{
  color: white;
}
nav ul{
    list-style:none;
    display:flex;
    gap:20px;
    margin:0;
    padding:0;
}
nav a{
    text-decoration:none;
    color:white;
    font-weight:bold;
}
nav a:hover{
    color:#38bdf8;
}
.container {
    padding: 30px;
}

h1 {
    text-align: center;
}

.stats {
    display: flex;
    gap: 20px;
    justify-content: center;
    margin: 20px 0;
}

.box {
    padding: 20px;
    border-radius: 15px;
    background: white;
    width: 120px;
    text-align: center;
}

.box.black {
    background: hsl(0, 90%, 20%);
    color: white;
}

.filters {
    text-align: center;
    margin-bottom: 20px;
}

button {
    padding: 8px 15px;
    margin: 5px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
}

.active {
    background: hsl(0, 90%, 20%);
    color: white;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
}

.card {
    background: hsl(0, 90%, 20%);
    padding: 15px;
    border-radius: 15px;
}

.tag {
    background: black;
    color: white;
    padding: 3px 10px;
    border-radius: 10px;
    font-size: 12px;
}
h3{
    color:white;
}

footer{
    text-align:center;
    padding:20px;
    background:hsl(0, 90%, 20%);
    margin-top:40px;
    color: white;
}
</style>
</head>

<body>

<header>
<nav>
<h2 class="logo">My Portfolio</h2>
<ul>
<li><a href="index.html">Home</a></li>
<li><a href="dashboard.html">Dashboard</a></li>
<li><a href="upload.html">Upload</a></li>
</ul>
</nav>
</header>

<div class="container">

<h1>My Dashboard</h1>

<div class="stats">
    <div class="box black"><h2 id="total">0</h2><p>Total</p></div>
    <div class="box"><h2 id="quizCount">0</h2><p>Quiz</p></div>
    <div class="box"><h2 id="labCount">0</h2><p>Lab</p></div>
    <div class="box"><h2 id="examCount">0</h2><p>Exam</p></div>
</div>

<div class="filters">
    <button onclick="filterData('all')" class="active">All</button>
    <button onclick="filterData('Quiz')">Quiz</button>
    <button onclick="filterData('Lab')">Lab</button>
    <button onclick="filterData('Exam')">Exam</button>
</div>

<div class="grid" id="list"></div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("files")) || [];

function render(filter = "all") {
    let list = document.getElementById("list");
    list.innerHTML = "";

    let filtered = filter === "all" ? data : data.filter(item => item.type === filter);

    filtered.forEach(item => {
        list.innerHTML += `
            <div class="card">
                <span class="tag">${item.type}</span>
                <h3>${item.name}</h3>
                <p>${item.date}</p>
            </div>
        `;
    });

    updateStats();
}

function updateStats() {
    document.getElementById("total").innerText = data.length;
    document.getElementById("quizCount").innerText = data.filter(x => x.type==="Quiz").length;
    document.getElementById("labCount").innerText = data.filter(x => x.type==="Lab").length;
    document.getElementById("examCount").innerText = data.filter(x => x.type==="Exam").length;
}

function filterData(type) {
    document.querySelectorAll("button").forEach(btn => btn.classList.remove("active"));
    event.target.classList.add("active");
    render(type);
}


render();
</script>
<footer>
<p>Email: valerieviancabelen@gmail.com</p>
</footer>
</body>
</html>

<div class="container">

<h1>Upload Activities</h1>

<div class="cards">

<div class="card">
    <h3>Quiz</h3>
    <input type="file" onchange="uploadFile(event, 'Quiz')">
</div>

<div class="card">
    <h3>Lab Activity</h3>

</div>

<div class="card">
    <h3>Major Exam</h3>
    <input type="file" onchange="uploadFile(event, 'Exam')">
</div>

</div>

</div>

<script>
function uploadFile(event, type) {
    let file = event.target.files[0];
    if (!file) return;

    let reader = new FileReader();
    reader.onload = function() {
        let data = JSON.parse(localStorage.getItem("files")) || [];

        data.push({
            id: Date.now(),
            name: file.name,
            type: type,
            mime: file.type || 'application/octet-stream',
            date: new Date().toLocaleString(),
            content: reader.result
        });

        localStorage.setItem("files", JSON.stringify(data));
        event.target.value = '';
        alert("Uploaded successfully!");
    };
    reader.readAsDataURL(file);
}
</script>
